    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = phrasesData.map((phrase, index) => `
            <button 
                onclick="selectTab(${index})"
                class="w-full text-left px-4 py-3 rounded-xl border-2 transition-all duration-200 
                ${index === activeTab 
                    ? 'bg-blue-50 border-blue-500 text-blue-700' 
                    : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-slate-300'
                }">
                <span class="block font-bold text-sm">${phrase.title}</span>
                <span class="block text-xs mt-0.5 ${index === activeTab ? 'text-blue-400' : 'text-slate-400'}">${phrase.translation}</span>
            </button>
        `).join('');
    }

    function renderContent() {
        const display = document.getElementById('content-display');
        const phrase = phrasesData[activeTab];
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        prevBtn.disabled = activeTab === 0;
        nextBtn.disabled = activeTab === phrasesData.length - 1;

        // Aba Mapa
        if (phrase.isOverview) {
            display.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">🧭 Mapa do Francês Fluido</h2>
                        <p class="text-slate-500 mt-1 text-sm">
                            Antes de mergulhar nas expressões, veja este guia rápido. Ele mostra os três pilares do seu curso:

                            <span class="font-semibold">ON vs NOUS</span>.
                        </p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4">
                            <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">1. Ligação (Liaison)</p>
                            <p class="text-sm text-blue-900 mb-2">
                                Quando uma consoante “muda” (normalmente muda) no fim de uma palavra é pronunciada 
                                e grudada na vogal da palavra seguinte.
                            </p>
                            <ul class="text-xs text-blue-900 space-y-1">
                                <li>• <span class="font-mono font-bold">nous <u>z</u>allons</span> → nu-zalõ</li>
                                <li>• <span class="font-mono font-bold">fai<u>z</u> attention</span> → fê-zatãciõ</li>
                                <li>• <span class="font-mono font-bold">beau<u>z</u> enfants</span> (outro bloco)</li>
                            </ul>
                        </div>

                        <div class="bg-orange-50 border border-orange-200 rounded-2xl p-4">
                            <p class="text-xs font-bold text-orange-500 uppercase tracking-wider mb-2">2. Elisão (Som que cai)</p>
                            <p class="text-sm text-orange-900 mb-2">
                                Quando um som (geralmente o “e”) desaparece para a fala ficar mais rápida e fluida.
                            </p>
                            <ul class="text-xs text-orange-900 space-y-1">
                                <li>• <span class="font-mono font-bold">je ai → j'ai</span></li>
                                <li>• <span class="font-mono font-bold">ce est → c'est</span></li>
                                <li>• <span class="font-mono font-bold">de problème → d'problème</span></li>
                                <li>• <span class="font-mono font-bold">je m'en vais → j'm'en vais</span></li>
                            </ul>
                        </div>

                        <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
                            <p class="text-xs font-bold text-green-500 uppercase tracking-wider mb-2">3. ON vs NOUS</p>
                            <p class="text-sm text-green-900 mb-2">
                                Os dois significam “nós”, mas o uso é diferente:
                            </p>
                            <ul class="text-xs text-green-900 space-y-1">
                                <li>• <span class="font-mono font-bold">nous</span> → mais formal, escrito, reuniões.</li>
                                <li>• <span class="font-mono font-bold">on</span> → fala real, amigos, cotidiano.</li>

                            </ul>

                    </div>

                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5">

                            <li>Clique nas abas à esquerda: cada uma traz uma expressão-chave.</li>
                            <li>Veja sempre: escrita formal, fala real, versão “para brasileiro”.</li>
                            <li>Leia a explicação focando no que muda no som (ligação? elisão? on vs nous?).</li>
                            <li>Depois, faça o exercício da aba, escrevendo a frase em francês.</li>
                            <li>No final, use a aba <span class="font-mono font-bold">🎯 Exercícios Finais</span> para treinar tradução PT → FR.</li>
                        </ol>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">🧩 Onde cada bloco entra?</p>
                        <ul class="text-sm text-slate-700 space-y-1">
                            <li>• <span class="font-semibold">Bloco Il y a / Y'a</span>: falar de “ter / haver” em situações reais.</li>
                            <li>• <span class="font-semibold">Bloco C'est / Ce n'est pas</span>: julgar, reagir, dizer “é isso / não é isso”.</li>
                            <li>• <span class="font-semibold">Bloco Qu'est-ce que / Est-ce que</span>: perguntas naturais, não de livro.</li>
                            <li>• <span class="font-semibold">Bloco Idiomático</span>: o francês das conversas, memes e mensagens.</li>
                        </ul>
                    </div>
                </div>
            `;
            return;
        }

        // Aba exercícios finais
        if (phrase.isExerciseTab) {
            display.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">🎯 Exercícios Finais</h2>
                        <p class="text-slate-500 mt-1">Traduza as expressões do português para o francês.</p>
                    </div>

                    <div class="bg-white border-2 border-slate-200 rounded-2xl p-6">
                        <h3 class="text-xl font-bold text-slate-800 mb-1">📝 Tradução: Português → Francês</h3>
                        <p class="text-slate-500 text-sm mb-6">Leia a expressão em português e escreva o equivalente em francês.</p>

                        <div id="ex-progress" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3"></div>

                        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
                            <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">🇧🇷 Em Português</p>
                            <p id="ex-question" class="text-2xl font-black text-blue-900"></p>

                        <input

                            placeholder="Escreva em francês..."

                            <button onclick="nextFinalQuestion()" class="flex-1 px-4 py-3 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-800 transition-colors">
                                ➡️ Próxima
                            </button>
                        </div>

                        <div id="ex-feedback" class="mt-4 p-4 rounded-xl border-2 hidden text-base"></div>
                    </div>
                </div>
            `;
            initFinalExercise();
            return;
        }

        // Abas normais
        display.innerHTML = `
            <div class="space-y-5">
                <div>
                    <h2 class="text-3xl font-black text-slate-800">${phrase.title}</h2>
                    <p class="text-lg text-blue-600 font-semibold mt-1">${phrase.translation}</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">✏️ Escrita Padrão</p>
                        <p class="font-mono text-xl font-bold text-slate-800">${phrase.writing}</p>
                    </div>
                    <div class="bg-orange-50 border border-orange-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-orange-400 uppercase tracking-wider mb-2">🗣️ Pronúncia Fluida Real</p>
                        <p class="font-mono text-xl font-bold text-orange-800">${phrase.native}</p>
                    </div>
                </div>

                <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
                    <p class="text-xs font-bold text-green-500 uppercase tracking-wider mb-2">🇧🇷 Como o Brasileiro Aprende</p>
                    <p class="font-mono text-2xl font-black text-green-800">"${phrase.brazilian}"</p>
                </div>

                <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4">
                    <p class="text-xs font-bold text-yellow-600 uppercase tracking-wider mb-2">📍 Contexto de Uso</p>
                    <p class="text-yellow-900 font-medium text-sm leading-relaxed">${phrase.context}</p>
                </div>

                <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5">
                    <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-3">🔍 O Que Acontece — Explicação Detalhada</p>
                    <p class="text-blue-900 leading-relaxed text-sm">${phrase.explanation}</p>
                </div>

                <div class="bg-purple-50 border border-purple-200 rounded-2xl p-4">
                    <p class="text-xs font-bold text-purple-500 uppercase tracking-wider mb-2">💬 Exemplo em Contexto Real</p>
                    <p class="font-semibold text-purple-900 italic">"${phrase.exampleSentence}"</p>
                    <p class="text-purple-600 text-sm mt-1">${phrase.exampleTranslation}</p>
                </div>

                <div class="bg-white border-2 border-slate-200 rounded-2xl p-5">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">✍️ Exercício Prático</p>
                    <div class="bg-slate-50 rounded-xl p-4 mb-4">
                        <p class="text-xs font-semibold text-slate-500 mb-1">📌 Situação:</p>
                        <p class="text-slate-700 text-sm">${phrase.exerciseSituation}</p>
                    </div>
                    <p class="font-bold text-slate-800 mb-1 text-sm">${phrase.exerciseQuestionFr}</p>
                    <p class="text-slate-400 text-xs mb-4 italic">(${phrase.exerciseQuestionPt})</p>
                    <input 
                        type="text" 
                        id="exercise-input" 
                        class="w-full p-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 mb-3 text-slate-800" 
                        placeholder="Digite sua resposta em francês..."
                        onkeydown="if(event.key==='Enter') checkAnswer(${activeTab})">
                    <button 
                        onclick="checkAnswer(${activeTab})" 
                        class="w-full px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors text-sm">
                        Verificar Resposta
                    </button>
                    <div id="exercise-feedback" class="mt-3 p-3 rounded-xl border-2 hidden text-sm"></div>
                </div>
            </div>
        `;
    }

    const translationData = () =>
        phrasesData
            .filter(p => !p.isExerciseTab && !p.isOverview)
            .map(p => ({ portuguese: p.translation, french: p.exerciseCorrectAnswer }));

    let currentFinalIndex = 0;
    let shuffledFinalData = [];

    function initFinalExercise() {
        shuffledFinalData = shuffleArray(translationData());
        currentFinalIndex = 0;
        showFinalQuestion();
    }

    function showFinalQuestion() {
        const qEl = document.getElementById('ex-question');
        const iEl = document.getElementById('ex-input');
        const fEl = document.getElementById('ex-feedback');
        const pEl = document.getElementById('ex-progress');

        if (!qEl || !iEl || !fEl) return;

        const current = shuffledFinalData[currentFinalIndex];
        qEl.textContent = current.portuguese;
        iEl.value = '';
        iEl.classList.remove('correct-answer', 'incorrect-answer');
        fEl.classList.add('hidden');
        fEl.innerHTML = '';
        iEl.focus();

        if (pEl) {
            pEl.textContent = `Questão ${currentFinalIndex + 1} de ${shuffledFinalData.length}`;
        }
    }

    function checkFinalAnswer() {
        const iEl = document.getElementById('ex-input');
        const fEl = document.getElementById('ex-feedback');
        if (!iEl || !fEl) return;

        const userAnswer = iEl.value.trim().toLowerCase();
        const current = shuffledFinalData[currentFinalIndex];
        const correctAnswers = current.french.map(a => a.toLowerCase().trim());

        fEl.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
        iEl.classList.remove('correct-answer', 'incorrect-answer');

        if (correctAnswers.includes(userAnswer)) {
            fEl.classList.add('correct-answer');
            iEl.classList.add('correct-answer');
            fEl.innerHTML = '✅ <span class="font-bold text-green-800">Correto! Excelente!</span>';
        } else {
            fEl.classList.add('incorrect-answer');
            iEl.classList.add('incorrect-answer');
            fEl.innerHTML = `❌ <span class="font-bold text-red-800">Não exatamente.</span> Resposta esperada: <span class="font-mono font-bold text-red-700">"${current.french[0]}"</span>`;
        }
    }

    function nextFinalQuestion() {
        currentFinalIndex = (currentFinalIndex + 1) % shuffledFinalData.length;
        showFinalQuestion();
    }

    function checkAnswer(tabIndex) {
        const input = document.getElementById('exercise-input');
        const feedback = document.getElementById('exercise-feedback');
        if (!input || !feedback) return;

        const userAnswer = input.value.trim().toLowerCase();
        const phrase = phrasesData[tabIndex];
        const correctAnswers = phrase.exerciseCorrectAnswer.map(a => a.toLowerCase().trim());

        feedback.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
        input.classList.remove('correct-answer', 'incorrect-answer');

        if (correctAnswers.includes(userAnswer)) {
            feedback.classList.add('correct-answer');
            input.classList.add('correct-answer');
            feedback.innerHTML = '✅ <span class="font-bold text-green-800">Correto! Muito bem!</span>';
        } else {
            feedback.classList.add('incorrect-answer');
            input.classList.add('incorrect-answer');
            feedback.innerHTML = `❌ <span class="font-bold text-red-800">Não exatamente.</span> Resposta esperada: <span class="font-mono font-bold text-red-700">"${phrase.exerciseCorrectAnswer[0]}"</span>`;
        }
    }

    function selectTab(index) {
        activeTab = index;
        renderTabs();
        renderContent();
        document.getElementById('content-display').scrollTop = 0;
        const container = document.getElementById('tab-container');
        const buttons = container.querySelectorAll('button');
        if (buttons[index]) {
            buttons[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function navigate(direction) {
        const newIndex = activeTab + direction;
        if (newIndex >= 0 && newIndex < phrasesData.length) {
            selectTab(newIndex);
        }
    }

    document.getElementById('prev-btn').onclick = () => navigate(-1);
    document.getElementById('next-btn').onclick = () => navigate(1);

    window.onload = function () {
        activeTab = 0;
        renderTabs();
        renderContent();
    };
</script>
